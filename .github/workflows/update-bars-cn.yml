name: Update CN Bars

on:
  schedule:
    # UTC 09:00 Mon-Fri ≈ Beijing 17:00 (after CN market close at 15:00)
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Fetch bars for a specific date (YYYY-MM-DD). Leave empty for last trading day."
        required: false

jobs:
  update-bars-cn:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Fetch and upload CN bars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python -c "
          import datetime, os, logging
          logging.basicConfig(level=logging.INFO)

          from scripts.fetch_bars_cn import fetch_cn_bars, load_cn_symbols
          from scripts.utils.trading_calendar import is_trading_day, last_trading_day
          from scripts.utils.parquet_io import read_bars, write_bars, append_bars
          from scripts.utils.release_upload import download_asset, upload_asset, get_or_create_release
          from pathlib import Path

          # Determine target date
          date_input = '${{ github.event.inputs.date }}'.strip()
          if date_input:
              target = datetime.date.fromisoformat(date_input)
          else:
              target = last_trading_day('CN')

          if not is_trading_day('CN', target):
              print(f'{target} is not a CN trading day, skipping.')
              raise SystemExit(0)

          print(f'Fetching CN bars for {target}')

          # Load symbols
          sse_szse, bse = load_cn_symbols()
          print(f'Symbols: {len(sse_szse)} SSE/SZSE, {len(bse)} BSE')

          if not sse_szse and not bse:
              print('No symbols found, skipping.')
              raise SystemExit(0)

          # Fetch bars
          new_bars = fetch_cn_bars(sse_szse, bse, target, target)
          print(f'Fetched {len(new_bars)} bar records')

          if new_bars.empty:
              print('No bars fetched, skipping upload.')
              raise SystemExit(0)

          # Download existing parquet from release (if any)
          repo = os.environ.get('GITHUB_REPOSITORY', '')
          token = os.environ['GITHUB_TOKEN']
          tag = 'data-cn-bars'
          asset_name = 'cn_bars.parquet'
          local_path = Path('data') / asset_name

          release = get_or_create_release(repo, tag, token, name='CN Daily Bars')

          downloaded = download_asset(repo, tag, asset_name, str(local_path), token)

          if downloaded:
              append_bars(new_bars, local_path)
              print(f'Appended to existing parquet')
          else:
              local_path.parent.mkdir(parents=True, exist_ok=True)
              write_bars(new_bars, local_path)
              print(f'Created new parquet')

          # Upload
          upload_asset(repo, tag, str(local_path), token)
          print(f'Uploaded {asset_name} to release {tag}')
          "
